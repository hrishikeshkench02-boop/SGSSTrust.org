<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Sai Gokula Seva Samsthe (SGSS) - Empowering lives through skill development and employment.">
    <title>Sai Gokula Seva Samsthe | Employment & Empowerment</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="src/css/style.css?v=3">
    <!-- <link rel="stylesheet" href="src/css/debug-grid.css"> --> <!-- Grid Disabled for Launch -->
</head>

<body>

    <header>
        <div class="container">
            <nav>
                <a href="#" class="logo-link">
                    <img src="src/assets/logo.png" alt="SGSS Logo" class="logo-img">
                    <span class="logo-text">Sai Gokula Seva Samsthe</span>
                </a>
                <button class="mobile-menu-toggle" aria-label="Toggle navigation">☰</button>
                <ul class="nav-links">
                    <li><a href="#what-we-do">What We Do</a></li>
                    <li><a href="#impact">Our Impact</a></li>
                    <li><a href="#partner">Partnerships</a></li>
                    <li><a href="#contact">Contact</a></li>
                    <li><a href="#donate" class="nav-btn-donate">Donate</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <!-- 1. Hero Section -->
        <section id="home" class="hero-section">
            <div id="hero-slideshow" class="hero-slideshow"></div>
            <div id="dynamic-hero-container" class="container hero-container" style="position: relative; z-index: 2;">
                <!-- Dynamically rendered -->
            </div>
        </section>

        <!-- 2. What We Do Section -->
        <section id="what-we-do" class="section-bg-light">
            <div class="container" id="dynamic-what-we-do">
                <!-- Dynamically rendered -->
            </div>
        </section>

        <!-- 3. Our Impact & Partnerships -->
        <section id="impact" class="section-bg-light">
            <div class="container" id="dynamic-impact">
                <!-- Dynamically rendered -->
            </div>
        </section>

        <!-- 4. Why This Matters -->
        <section id="why-matters" class="section-bg-primary text-light">
            <div class="container" id="dynamic-why-matters">
                <!-- Dynamically rendered -->
            </div>
        </section>

        <!-- 5. Donate -->
        <section id="donate">
            <div class="container" id="dynamic-donations">
                <!-- Dynamically rendered -->
            </div>
        </section>

        <!-- 6. Partner -->
        <section id="partner" class="section-bg-light">
            <div class="container" id="dynamic-partners">
                <!-- Dynamically rendered -->
            </div>
        </section>

    </main>

    <footer id="contact">
        <div class="container" id="dynamic-footer">
            <!-- Dynamically rendered -->
        </div>
    </footer>

    <!-- Scripts -->
    <script src="src/js/main.js"></script>
</body>

</html>
